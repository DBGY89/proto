<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUBBLES — AI Proto Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <nav class="topbar">
    <a href="../../index.html" class="back-link">&larr; AI Proto Lab</a>
    <div class="score-display" id="score-display" hidden>
      <span class="score-label">Score</span>
      <span id="score" class="score-value">0</span>
    </div>
  </nav>

  <main class="game-area" id="game-area">
    <div class="splash-preview" id="splash-preview" aria-hidden="true">
      <span class="bubble-preview" style="--preview-left: 12%; --preview-size: 32px; --preview-dur: 16s; --preview-delay: 0s;"></span>
      <span class="bubble-preview" style="--preview-left: 38%; --preview-size: 24px; --preview-dur: 18s; --preview-delay: 3s;"></span>
      <span class="bubble-preview" style="--preview-left: 58%; --preview-size: 28px; --preview-dur: 14s; --preview-delay: 1.5s;"></span>
      <span class="bubble-preview" style="--preview-left: 78%; --preview-size: 20px; --preview-dur: 20s; --preview-delay: 4s;"></span>
      <span class="bubble-preview" style="--preview-left: 22%; --preview-size: 22px; --preview-dur: 17s; --preview-delay: 6s;"></span>
      <span class="bubble-preview" style="--preview-left: 88%; --preview-size: 26px; --preview-dur: 15s; --preview-delay: 2s;"></span>
    </div>
    <div class="splash" id="splash">
      <h1 class="splash-title">BUBBLES</h1>
      <p class="splash-desc">Pop the bubbles before they float away. Special ones burst into glitter.</p>
      <button class="btn-start" id="btn-start">Play</button>
    </div>

    <div class="game-over" id="game-over" hidden>
      <p class="go-label">Time's up!</p>
      <p class="go-score">You popped <span id="final-score">0</span> bubbles</p>
      <button class="btn-start" id="btn-restart">Play Again</button>
    </div>

    <div class="vote-widget" data-project="bubbles" aria-label="Rate this prototype">
      <span class="vote-label">Rate this prototype</span>
      <span class="vote-nums">
        <span class="vote-num" data-value="1">1</span>
        <span class="vote-num" data-value="2">2</span>
        <span class="vote-num" data-value="3">3</span>
        <span class="vote-num" data-value="4">4</span>
        <span class="vote-num" data-value="5">5</span>
      </span>
      <span class="vote-thanks" id="vote-thanks" aria-live="polite">Thanks ✓</span>
    </div>
  </main>

  <!-- Footer: Part of AI Proto Lab — product tagline -->
  <footer class="footer">
    <p>Part of <a href="../../index.html">AI Proto Lab</a>. Pop, pop, hooray.</p>
  </footer>

  <div class="timer-bar" id="timer-bar"></div>

  <script src="./app.js"></script>
  <script src="/rating-vote.js"></script>
  <script>
  (function () {
    var project = 'bubbles';
    var key = 'rating_' + project;
    var widget = document.querySelector('.vote-widget');
    var thanks = document.getElementById('vote-thanks');
    if (widget && thanks) {
      var nums = widget.querySelectorAll('.vote-num');
      thanks.style.display = 'none';
      var saved = localStorage.getItem(key);
      if (saved) {
        var v = parseInt(saved, 10);
        nums.forEach(function (n) {
          var val = parseInt(n.getAttribute('data-value'), 10);
          n.classList.toggle('vote-selected', val === v);
          n.classList.toggle('vote-grey', val !== v);
        });
        thanks.style.display = 'inline';
      }
      nums.forEach(function (n) {
        n.addEventListener('click', function () {
          var v = parseInt(this.getAttribute('data-value'), 10);
          if (typeof saveRating === 'function') saveRating(project, v);
          nums.forEach(function (x) {
            var val = parseInt(x.getAttribute('data-value'), 10);
            x.classList.toggle('vote-selected', val === v);
            x.classList.toggle('vote-grey', val !== v);
          });
          thanks.style.display = 'inline';
        });
      });
    }
  })();
  </script>
</body>
</html>
