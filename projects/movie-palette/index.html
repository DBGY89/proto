<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Palette — AI Proto Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <nav class="topbar">
    <a href="../../index.html" class="back-link">&larr; AI Proto Lab</a>
  </nav>

  <div class="bg-pattern" aria-hidden="true"></div>

  <main class="page">
    <header class="hero">
      <h1 class="hero-title">Movie Palette</h1>
      <p class="intro">The colors you remember. The hex you didn't have. Pick a film — we did the rest.</p>
    </header>

    <section class="picker-section">
      <select id="movie-select" class="movie-select" aria-label="Choose movie">
        <option value="">— Choose a film —</option>
        <option value="pulp-fiction">Pulp Fiction</option>
        <option value="forrest-gump">Forrest Gump</option>
        <option value="big-fish">Big Fish</option>
        <option value="grand-budapest-hotel">The Grand Budapest Hotel</option>
        <option value="amelie">Amélie</option>
        <option value="john-wick">John Wick</option>
        <option value="la-la-land">La La Land</option>
        <option value="her">Her</option>
        <option value="the-matrix">The Matrix</option>
        <option value="moonrise-kingdom">Moonrise Kingdom</option>
        <option value="the-fall">The Fall (2006)</option>
        <option value="gladiator">Gladiator</option>
      </select>
    </section>

    <div class="palette-panel" id="palette-panel">
      <p class="palette-placeholder" id="palette-placeholder">Choose a movie above to see its palette.</p>
      <div class="palette-wrap" id="palette-wrap" hidden>
        <h2 class="palette-title" id="palette-title"></h2>
        <div class="swatches" id="swatches"></div>
        <button type="button" class="export-cta" id="download-palette" hidden aria-label="Export palette as image">
          <svg class="export-cta__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span class="export-cta__label">Export</span>
        </button>
      </div>
    </div>
  </main>

  <!-- Footer: Part of AI Proto Lab — product tagline -->
  <footer class="footer">
    <p>Part of <a href="../../index.html">AI Proto Lab</a> — colors stolen from the best.</p>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
